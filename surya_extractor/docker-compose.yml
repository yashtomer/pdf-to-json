# Surya 2 MPR Extractor — server deployment.
#   docker compose up -d        # build + run, survives reboots
#   docker compose logs -f      # watch startup ("[surya2] Ready.")
#
# Code changes WITHOUT a rebuild:
#   The three .py source files are bind-mounted over the image's copies, so the
#   running container imports the host's code. After editing any of them:
#     git pull          # (or edit locally)
#     docker compose restart      # ~10s — re-imports code, model reloads from cache
#   A full `docker compose up -d --build` is only needed when DEPENDENCIES change
#   (pyproject.toml / Dockerfile).
#
# CPU by default. For GPU, build a vLLM image and uncomment the `deploy` block
# + set SURYA_INFERENCE_BACKEND=vllm (see README "Deploy on a server").

services:
  surya:
    build: .
    image: surya-extractor
    container_name: surya
    restart: unless-stopped
    ports:
      # Host port is configurable — set SURYA_HOST_PORT if 8000 is taken on the
      # server (e.g. another app already uses it). Defaults to 8000.
      # Bound to localhost only — put nginx/Caddy in front for TLS + auth.
      # Use "0.0.0.0:${SURYA_HOST_PORT:-8000}:8000" to expose directly on the LAN.
      - "127.0.0.1:${SURYA_HOST_PORT:-8000}:8000"
    volumes:
      # Named volume persists the ~1-2 GB GGUF model across restarts.
      - surya-cache:/root/.cache
      # Bind-mount the whole source dir over /app, so editing any .py file +
      # `docker compose restart` picks it up with NO image rebuild. The venv
      # lives at /opt/venv (set in the Dockerfile), so it is NOT shadowed by
      # this mount. Read-only — the app never writes into /app.
      - ./:/app:ro
    environment:
      SURYA_INFERENCE_BACKEND: llamacpp
      SURYA_INFERENCE_PARALLEL: "1"      # raise on GPU for throughput
      PYTHONPATH: /app                   # so `import server` resolves under the /app mount
      PYTHONDONTWRITEBYTECODE: "1"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 120s                  # model load grace period

    # --- GPU (NVIDIA) — requires a vLLM image + NVIDIA Container Toolkit ---
    # environment:
    #   SURYA_INFERENCE_BACKEND: vllm
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

volumes:
  surya-cache:
