# LangChain MPR extractor — replaces Surya on the same host port (default 8080),
# so the existing Apache vhost (pdfparser.aeologic.in → localhost:8080) keeps
# working unchanged. Stop Surya first to free the port.
#
#   cp .env.example .env        # then paste ANTHROPIC_API_KEY into .env
#   docker compose up -d --build
#
# Code-only changes (app/*.py) need NO rebuild — they're bind-mounted:
#   git pull && docker compose restart

services:
  langchain-pdf:
    build: .
    image: langchain-pdf
    container_name: langchain-pdf
    restart: unless-stopped
    labels:
      - "autoheal=true"
    ports:
      # Same host port Surya used → Apache proxy unchanged. Localhost-only.
      - "127.0.0.1:${LCPDF_HOST_PORT:-8080}:8000"
    env_file:
      - .env                    # ANTHROPIC_API_KEY, model, etc. injected as env vars
    volumes:
      # Bind-mount source so `git pull && docker compose restart` picks up code
      # changes with no rebuild (deps live in the image, not shadowed).
      - ./app:/app/app:ro
      - ./batch_extract.py:/app/batch_extract.py:ro
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # Auto-restart langchain-pdf if it ever goes unhealthy (a true hang). Scoped by
  # label so it only touches this container. restart: unless-stopped above already
  # covers plain crashes/exits and host reboots.
  autoheal:
    image: willfarrell/autoheal:latest
    container_name: langchain-pdf-autoheal
    restart: unless-stopped
    environment:
      AUTOHEAL_CONTAINER_LABEL: autoheal
      AUTOHEAL_INTERVAL: "15"
      AUTOHEAL_START_PERIOD: "30"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
